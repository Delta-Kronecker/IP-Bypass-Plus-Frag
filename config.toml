# IP Bypass Plus configuration file

# ---------------------------------------------------------------------------
# Proxy Listener
# ---------------------------------------------------------------------------

LISTEN_HOST = "127.0.0.1"
LISTEN_PORT = 40443

# ---------------------------------------------------------------------------
# Operating Mode (ip_bypass_plus only)
# ---------------------------------------------------------------------------

MODE = "ip_bypass_plus"
AUTO_SELECT = false
SELECTED_IP = ""
IP_POOL = 10
MAX_IP_SCAN = 1000

# ---------------------------------------------------------------------------
# Input Files
# ---------------------------------------------------------------------------

IP_LIST = "ip_list.txt"

# ---------------------------------------------------------------------------
# Scan Behavior
# ---------------------------------------------------------------------------

SCAN_TIMEOUT_SECS = 5
RESCAN_INTERVAL_SECS = 0
SNI_SWITCH_MIN_SCORE = 1
SCAN_OUTPUT = ""

# ---------------------------------------------------------------------------
# Scanner Tuning
# ---------------------------------------------------------------------------

IP_MAX_P1_CONCURRENT = 128
IP_MAX_P2_CONCURRENT = 32
SCAN_DOWNLOAD_CAP = 10240
SCAN_UPLOAD_CAP = 10240
SCAN_UPLOAD_PATH = "/"
IP_SCAN_SNI = "cloudflare.com"
IPV6_MAX_HOSTS = 65536

# ---------------------------------------------------------------------------
# Scoring Parameters
# ---------------------------------------------------------------------------

TCP_LATENCY_CAP_MS = 500.0
TLS_LATENCY_CAP_MS = 1000.0
TTFB_CAP_MS = 2000.0
SPEED_CAP_BPS = 2048000.0
UPLOAD_SPEED_CAP_BPS = 2048000.0

# ---------------------------------------------------------------------------
# Bypass Engine (tls_record_frag or tls_frag)
# ---------------------------------------------------------------------------

BYPASS_METHOD = "tls_frag"
BYPASS_TIMEOUT_SECS = 20
RELAY_MAX_LIFETIME_SECS = 0

# ---------------------------------------------------------------------------
# Linux NFQUEUE (only for tls_record_frag)
# ---------------------------------------------------------------------------

NFQUEUE_NUM = 1
LINUX_FIREWALL_BACKEND = "iptables"

# ---------------------------------------------------------------------------
# tls_record_frag parameters
# ---------------------------------------------------------------------------

TLS_RECORD_FRAG_SIZE = 1
TLS_RECORD_FRAG_SET_PSH = true
TLS_RECORD_FRAG_BUMP_IP_IDENT = true

# ---------------------------------------------------------------------------
# tls_frag parameters
# ---------------------------------------------------------------------------

TLS_FRAG_PACKETS = "1-3"
TLS_FRAG_LENGTH = "100-200"
TLS_FRAG_INTERVAL_MS = "10-20"
TCP_SEG_SIZE = 1
TCP_SEG_NODELAY = true
